name: ODIN Data Snapshot

on:
  schedule:
    # 06:17 UTC diario (03:17 BRT) — fora do horario de pico
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch data snapshots
        run: node scripts/fetch-data.mjs
      - name: Commit snapshots
        run: |
          git config user.name "odin-data-bot"
          git config user.email "odin-data-bot@users.noreply.github.com"
          if git diff --quiet public/data; then
            echo "Sem alteracoes nos snapshots."
            exit 0
          fi
          git add public/data
          git commit -m "chore(data): snapshot diario [skip ci]"
          git push
